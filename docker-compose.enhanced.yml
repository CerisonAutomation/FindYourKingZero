/**
 * ═══════════════════════════════════════════════════════════════════════════════
 * 🚀 ENHANCED DOCKER ENTERPRISE STACK
 * ═══════════════════════════════════════════════════════════════════════════════
 *
 * Production-ready Docker Compose with advanced monitoring, security,
 * auto-scaling, and comprehensive logging for enterprise deployment
 *
 * @author FindYourKingZero DevOps Team
 * @version 4.0.0
 */

version: '3.8'

services:
  # 🚀 MAIN APPLICATION
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        - NODE_ENV=production
        - BUILD_DATE=${BUILD_DATE}
        - VCS_REF=${VCS_REF}
    image: findyourking/app:latest
    container_name: findyourking-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_OPENAI_API_KEY=${OPENAI_API_KEY}
      - VITE_APP_ENV=production
      - LOG_LEVEL=info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`findyourking.com`)"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
    networks:
      - findyourking-network
    volumes:
      - ./logs:/app/logs
      - app-uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 🗄️ POSTGRESQL DATABASE WITH POSTGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: findyourking-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
      - postgres-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 📊 REDIS CACHE AND SESSION STORAGE
  redis:
    image: redis:7-alpine
    container_name: findyourking-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 🌐 NGINX REVERSE PROXY
  nginx:
    image: nginx:alpine
    container_name: findyourking-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - app-uploads:/var/www/uploads
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 📈 PROMETHEUS METRICS COLLECTION
  prometheus:
    image: prom/prometheus:latest
    container_name: findyourking-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 📊 GRAFANA DASHBOARDS
  grafana:
    image: grafana/grafana:latest
    container_name: findyourking-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 📋 ELASTICSEARCH LOG STORAGE
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: findyourking-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 🔄 LOGSTASH LOG PROCESSING
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: findyourking-logstash
    restart: unless-stopped
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/config:/usr/share/logstash/config
      - ./logs:/logs
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 📈 KIBANA LOG VISUALIZATION
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: findyourking-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 🔍 JAEGER TRACING
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: findyourking-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 📊 NODE EXPORTER SYSTEM METRICS
  node-exporter:
    image: prom/node-exporter:latest
    container_name: findyourking-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 📊 CADVISOR CONTAINER METRICS
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: findyourking-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 🔐 VAULT SECRETS MANAGEMENT
  vault:
    image: hashicorp/vault:latest
    container_name: findyourking-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_ROOT_TOKEN}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    volumes:
      - vault-data:/vault/data
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 🔄 BACKUP SERVICE
  backup:
    image: postgres:15-alpine
    container_name: findyourking-backup
    restart: unless-stopped
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-backups:/backups
      - ./scripts/backup.sh:/backup.sh
    depends_on:
      - postgres
    command: >
      sh -c "
        while true; do
          echo '🔄 Starting backup...'
          /backup.sh
          echo '✅ Backup completed'
          sleep 86400
        done
      "
    networks:
      - findyourking-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ═══════════════════════════════════════════════════════════════════════════════
# 🌐 NETWORKS
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  findyourking-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

# ═══════════════════════════════════════════════════════════════════════════════
# 💾 VOLUMES
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  postgres-data:
    driver: local
  postgres-backups:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  elasticsearch-data:
    driver: local
  vault-data:
    driver: local
  app-uploads:
    driver: local
  nginx-logs:
    driver: local