<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#060610" />
    <meta name="description" content="Find Your King — Premium gay social platform. On-device AI, P2P encrypted, zero API keys." />
    <title>Find Your King</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #060610; font-family: 'DM Sans', system-ui, sans-serif; color: #fff; overflow: hidden; }
      #root { height: 100dvh; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulseGreen { 0%,100% { box-shadow: 0 0 5px #16A34A; } 50% { box-shadow: 0 0 18px #16A34A; } }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes typingDot { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
