# ═══════════════════════════════════════════════════════════════════════════════
# 🚀 ENHANCED PRODUCTION DEPLOYMENT PIPELINE
# ═══════════════════════════════════════════════════════════════════════════════

name: '🚀 Enhanced Production Deployment Pipeline'

on:
  push:
    branches: ['main', 'production']
    tags: ['v*']
  pull_request:
    branches: ['main']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      force_deploy:
        description: 'Force deployment (skip checks)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  # 🔍 PRE-COMMIT VALIDATION
  pre-commit:
    name: '🔍 Pre-Commit Validation'
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - name: '📥 Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: '📋 Check for Secrets'
        run: |
          echo "🔍 Checking for potential secrets..."
          if git grep -E "(sk-|AIzaSy|ghp_|gho_|ghu_|ghs_|ghr_|xoxb|xoxp)" -- . ':!*.md' ':!*.txt' ':!.git*'; then
            echo "❌ Potential secrets found in code!"
            exit 1
          fi
          echo "✅ No secrets detected"

  # 🏗️ BUILD & QUALITY GATES
  build-and-test:
    name: '🏗️ Build & Quality Gates'
    runs-on: ubuntu-latest
    needs: pre-commit
    outputs:
      build_success: ${{ steps.build.outcome }}
      test_success: ${{ steps.test.outcome }}
    steps:
      - name: '📥 Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: '🟢 Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: '📦 Install Dependencies'
        run: npm ci --prefer-offline --no-audit

      - name: '🔍 Type Checking'
        run: |
          echo "🔍 Running TypeScript type checking..."
          npm run type-check
          echo "✅ Type checking completed"

      - name: '🧹 Linting'
        run: |
          echo "🧹 Running ESLint..."
          npm run lint
          echo "✅ Linting completed"

      - name: '🎨 Code Formatting'
        run: |
          echo "🎨 Checking code formatting..."
          npm run format:check
          echo "✅ Code formatting verified"

      - name: '🔒 Security Audit'
        run: |
          echo "🔒 Running security audit..."
          npm run security:audit
          echo "✅ Security audit completed"

      - name: '🏗️ Build Application'
        id: build
        run: |
          echo "🏗️ Building application..."
          npm run build
          echo "✅ Build completed successfully"
          echo "build_size=$(du -sh dist | cut -f1)" >> $GITHUB_OUTPUT

      - name: '🧪 Unit Tests'
        id: test
        run: |
          echo "🧪 Running unit tests..."
          npm run test
          echo "✅ Unit tests completed"

      - name: '📋 Upload Build Artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # 🚀 DEPLOYMENT PIPELINE
  deploy:
    name: '🚀 Deploy to ${{ inputs.environment || 'staging' }}'
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production' || startsWith(github.ref, 'refs/tags/')) &&
      needs.build-and-test.outputs.build_success == 'success' &&
      needs.build-and-test.outputs.test_success == 'success'
    environment:
      name: ${{ inputs.environment || 'staging' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: '📥 Checkout Repository'
        uses: actions/checkout@v4

      - name: '🟢 Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: '📦 Install Dependencies'
        run: npm ci --prefer-offline

      - name: '📥 Download Build Artifacts'
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: '🚀 Deploy to Vercel'
        id: deploy
        run: |
          echo "🚀 Deploying to Vercel..."
          npm i -g vercel
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
          echo "✅ Deployment completed"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # 🔍 POST-DEPLOYMENT VERIFICATION
  post-deploy:
    name: '🔍 Post-Deployment Verification'
    runs-on: ubuntu-latest
    needs: [ deploy ]
    if: always() && needs.deploy.result == 'success'
    steps:
      - name: '🏥 Health Check'
        run: |
          echo "🏥 Running health check..."
          sleep 10
          curl -f https://findyourking.vercel.app/api/health || echo "⚠️ Health check endpoint not available"
          echo "✅ Health check completed"

      - name: '📊 Generate Deployment Report'
        run: |
          echo "📊 Generating deployment report..."
          cat << EOF > deployment-report.md
          # 🚀 Deployment Report
          
          ## 📋 Deployment Summary
          - **Environment**: ${{ inputs.environment || 'staging' }}
          - **Commit**: ${{ github.sha }}
          - **Branch**: ${{ github.ref_name }}
          - **Timestamp**: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          ## ✅ Completed Jobs
          - [x] Pre-commit validation
          - [x] Build and quality gates
          - [x] Web deployment
          - [x] Post-deployment verification
          EOF

      - name: '📋 Upload Deployment Report'
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.md
          retention-days: 90

      - name: '📢 Notify Slack'
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "🚀 *Deployment Successful*\n*Environment*: ${{ inputs.environment || 'staging' }}\n*Commit*: ${{ github.sha }}\n*Branch*: ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: '📢 Notify Slack (Failure)'
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "❌ *Deployment Failed*\n*Environment*: ${{ inputs.environment || 'staging' }}\n*Commit*: ${{ github.sha }}\n*Branch*: ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}